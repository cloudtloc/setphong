name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios-unsigned:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Tao env.template tu GitHub Secrets
        shell: bash
        env:
          DOTENV_FILE: ${{ secrets.DOTENV_FILE }}
        run: |
          set -euo pipefail
          if [ -z "${DOTENV_FILE:-}" ]; then
            echo "Canh bao: DOTENV_FILE chua dat trong GitHub Secrets. Dung env.template mac dinh trong repo."
          else
            printf '%s\n' "$DOTENV_FILE" > env.template
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Package into IPA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Payload
          rm -rf Payload/Runner.app
          cp -R build/ios/iphoneos/Runner.app Payload/
          (cd Payload && zip -r ../unsigned-ipa.ipa .)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: unsigned-ipa.ipa

      - name: Tom tat tai IPA
        shell: bash
        run: |
          echo "## Tai file IPA (unsigned)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Hoan tat. Vao muc **Artifacts**, tai goi **unsigned-ipa**." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
